apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: crds
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/ghshenavar/kubernetes-cluster-management.git
    targetRevision: main
    path: scripts/crds
  destination:
    server: https://kubernetes.default.svc
  syncPolicy:
    automated:
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
      - Prune=false

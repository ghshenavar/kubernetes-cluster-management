apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: my-app
  namespace: argocd
spec:
  project: default
  sources:
    - repoURL: https://github.com/ghshenavar/kubernetes-cluster-management.git
      targetRevision: main
      path: charts/management
      helm:
        valueFiles:
          - values.yaml
    - repoURL: https://github.com/ghshenavar/kubernetes-cluster-management.git
      targetRevision: main
      path: charts/sample-app
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: management
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/ghshenavar/kubernetes-cluster-management.git
    targetRevision: main
    path: charts/management
    helm:
      valueFiles:
        - values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: ingress-nginx
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true

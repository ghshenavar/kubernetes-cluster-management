kube-prometheus-stack:
  crds:
    enabled: false
  grafana:
    admin:
      existingSecret: "my-app-grafana-admin"
      userKey: "admin-user"
      passwordKey: "admin-password"
    ingress:
      enabled: true
      ingressClassName: nginx
      annotations:
        cert-manager.io/issuer: selfsigned-issuer
      hosts:
        - 86.38.238.174.compute.verda.run
      path: /grafana
      pathType: Prefix
      tls:
        - secretName: grafana-tls
          hosts:
            - 86.38.238.174.compute.verda.run/grafana
    grafana.ini:
      server:
        root_url: 86.38.238.174.compute.verda.run/grafana
        server_from_sub_path: true
  prometheus:
    ingress:
      enabled: true
      ingressClassName: nginx
      annotations:
        cert-manager.io/issuer: selfsigned-issuer
      hosts:
        - prometheus.example.com
      tls:
        - secretName: prometheus-tls
          hosts:
            - prometheus.example.com
  additionalPrometheusRules:
    - name: custom-alerts
      groups:
        - name: custom-alerts
          rules:
            - alert: PodRestartingTooOften
              expr: increase(kube_pod_container_status_restarts_total[10m]) > 5
              for: 2m
              labels:
                severity: warning
              annotations:
                summary: "Pod is restarting too often"
                description: "Pod {{ $labels.pod }} in namespace {{ $labels.namespace }} restarted more than 5 times in 10 minutes."
            - alert: HighNodeCPU
              expr: 100 - (avg by (instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 90
              for: 5m
              labels:
                severity: critical
              annotations:
                summary: "High CPU usage on node"
                description: "Node {{ $labels.instance }} CPU usage has been above 90% for more than 5 minutes."
  prometheus-node-exporter:
    hostNetwork: true
    hostPID: true
    tolerations:
      - operator: Exists

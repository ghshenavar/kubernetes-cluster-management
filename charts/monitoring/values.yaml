kube-prometheus-stack:
  crds:
    enabled: false
  grafana:
    admin:
      existingSecret: "my-app-grafana-admin"
      userKey: "admin-user"
      passwordKey: "admin-password"
    ingress:
      enabled: true
      ingressClassName: nginx

      annotations:
        cert-manager.io/issuer: selfsigned-issuer

      hosts:
        - grafana.example.com

      tls:
        - secretName: grafana-tls
          hosts:
            - grafana.example.com
  prometheus-node-exporter:
    hostNetwork: true
    hostPID: true
    tolerations:
      - operator: Exists

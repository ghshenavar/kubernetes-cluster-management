apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: ingress-nginx-metrics
  labels:
    release: monitoring-app
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: ingress-nginx
      app.kubernetes.io/component: controller
      app.kubernetes.io/instance: management-app
  namespaceSelector:
    matchNames:
      - management
  endpoints:
    - port: metrics
      interval: 30s


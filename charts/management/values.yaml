ingress-nginx:
  controller:
    replicaCount: 1
    hostNetwork: true
    dnsPolicy: ClusterFirstWithHostNet
    service:
      enabled: false
    admissionWebhooks:
      enabled: false
    metrics:
      enabled: true
      service:
        enabled: true

metrics-server:
  replicas: 1
  args:
    - --kubelet-certificate-authority=/etc/kubernetes/pki/ca.crt
    - --kubelet-preferred-address-types=InternalIP,ExternalIP,Hostname


